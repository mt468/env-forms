<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=forms_portal.html">
<title>Envisage Forms Portal</title>
</head>
<body>
<!-- ══ ENVISAGE ACCESS GATE ══════════════════════════════════════ -->
<div id="env_gate" style="position:fixed;inset:0;background:#0d1a35;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;padding:36px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 12px 50px rgba(0,0,0,.4);">
    <div style="width:56px;height:56px;background:#1a2744;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;">🔒</div>
    <div style="font-size:20px;font-weight:800;color:#1a2744;margin-bottom:4px;">Staff Access Only</div>
    <div style="font-size:12px;color:#6b7c93;margin-bottom:20px;line-height:1.6;">This page is restricted to Envisage staff.<br>Enter your company email to continue.</div>
    <input type="email" id="gate_email" placeholder="Enter your company email"
      style="width:100%;padding:10px 14px;border:2px solid #c0d0e4;border-radius:8px;font-size:13px;font-family:Arial,sans-serif;color:#1a2744;outline:none;margin-bottom:6px;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')_checkGate()">
    <div id="gate_err" style="color:#e74c3c;font-size:11.5px;font-weight:700;margin-bottom:10px;display:none;">❌ Access restricted to @envisageworldwide.com only.</div>
    <button onclick="_checkGate()"
      style="width:100%;background:#1a2744;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:background .2s;"
      onmouseover="this.style.background='#00b8a9'" onmouseout="this.style.background='#1a2744'">
      Continue →
    </button>
    <div style="margin-top:18px;font-size:10px;color:#bbb;border-top:1px solid #f0f0f0;padding-top:12px;">ENVISAGE WORLDWIDE &nbsp;·&nbsp; Internal Use Only</div>
  </div>
</div>
<script>
(function(){
  if(sessionStorage.getItem('env_auth')==='ok'){
    var g=document.getElementById('env_gate');
    if(g) g.style.display='none';
  }
})();
function _checkGate(){
  var email=(document.getElementById('gate_email').value||'').trim().toLowerCase();
  var err=document.getElementById('gate_err');
  if(email.endsWith('@envisageworldwide.com')){
    sessionStorage.setItem('env_auth','ok');
    document.getElementById('env_gate').style.display='none';
    err.style.display='none';
  } else {
    err.style.display='block';
    document.getElementById('gate_email').style.borderColor='#e74c3c';
    setTimeout(function(){document.getElementById('gate_email').style.borderColor='#c0d0e4';},2000);
  }
}
</script>
<!-- ══ END ACCESS GATE ══════════════════════════════════════════ -->
</body>
</html>
