<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=forms_portal.html">
<title>Envisage Forms Portal</title>
</head>
<body>
<!-- ══ ENVISAGE ACCESS GATE ══════════════════════════════════════ -->
<div id="env_gate" style="position:fixed;inset:0;background:#0d1a35;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;padding:36px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 12px 50px rgba(0,0,0,.4);">
    <div style="width:56px;height:56px;background:#1a2744;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;">🔒</div>
    <div style="font-size:20px;font-weight:800;color:#1a2744;margin-bottom:4px;">Staff Access Only</div>
    <div style="font-size:12px;color:#6b7c93;margin-bottom:20px;line-height:1.6;">This page is for internal staff only.<br>Enter your company email to continue.</div>
    <input type="email" id="gate_email" placeholder="Enter your company email"
      style="width:100%;padding:10px 14px;border:2px solid #c0d0e4;border-radius:8px;font-size:13px;font-family:Arial,sans-serif;color:#1a2744;outline:none;margin-bottom:6px;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')_checkGate()">
    <div id="gate_err" style="color:#e74c3c;font-size:11.5px;font-weight:700;margin-bottom:10px;display:none;">❌ Access restricted to @yourcompanyemail only.</div>
    <button onclick="_checkGate()"
      style="width:100%;background:#1a2744;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:background .2s;"
      onmouseover="this.style.background='#00b8a9'" onmouseout="this.style.background='#1a2744'">
      Continue →
    </button>
    <div style="margin-top:18px;font-size:10px;color:#bbb;border-top:1px solid #f0f0f0;padding-top:12px;">ENVISAGE WORLDWIDE &nbsp;·&nbsp; Internal Use Only</div>
  </div>
</div>
<script>
(function(){
  if(sessionStorage.getItem('env_auth')==='ok'){
    var g=document.getElementById('env_gate');
    if(g) g.style.display='none';
  }
})();
function _checkGate(){
  var email=(document.getElementById('gate_email').value||'').trim().toLowerCase();
  var err=document.getElementById('gate_err');
  if(email.endsWith('@envisageworldwide.com')){
    sessionStorage.setItem('env_auth','ok');
    document.getElementById('env_gate').style.display='none';
    err.style.display='none';
  } else {
    err.style.display='block';
    document.getElementById('gate_email').style.borderColor='#e74c3c';
    setTimeout(function(){document.getElementById('gate_email').style.borderColor='#c0d0e4';},2000);
  }
}
</script>
<!-- ══ END ACCESS GATE ══════════════════════════════════════════ -->

<script>
/* ── Email @envisageworldwide.com autocomplete ── */
(function(){
  var DOMAIN="@envisageworldwide.com";
  var st=document.createElement("style");
  st.textContent=".es-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1.5px solid #00b8a9;border-radius:6px;padding:7px 12px;font-size:12px;color:#1a2744;cursor:pointer;z-index:300;box-shadow:0 4px 14px rgba(0,184,169,.18);white-space:nowrap;font-family:Sarabun,sans-serif;line-height:1.4;}.es-drop:hover,.es-drop:focus{background:#e8faf8;outline:none;}.es-drop b{color:#00b8a9;font-weight:700;}.es-drop small{color:#aaa;float:right;margin-top:1px;font-weight:400;font-size:10px;}";
  document.head.appendChild(st);
  var inputs=Array.from(document.querySelectorAll("input[type=email]")).filter(function(el){
    var id=(el.id||"").toLowerCase();
    return id!=="personal_email";
  });
  inputs.forEach(function(el){
    var wrap=document.createElement("div");
    wrap.style.cssText="position:relative;flex:1;min-width:0;";
    el.parentNode.insertBefore(wrap,el);
    wrap.appendChild(el);
    el.style.width="100%";el.style.boxSizing="border-box";
    var drop=document.createElement("div");
    drop.className="es-drop";drop.style.display="none";drop.tabIndex=-1;
    wrap.appendChild(drop);
    el.addEventListener("input",function(){
      var v=el.value;
      if(!v||v.indexOf("@")!==-1){drop.style.display="none";return;}
      drop.innerHTML=v+"<b>"+DOMAIN+"</b><small>Tab / ↵ to fill</small>";
      drop._full=v+DOMAIN;drop.style.display="block";
    });
    el.addEventListener("keydown",function(e){
      if(drop.style.display==="none")return;
      if(e.key==="Escape"){drop.style.display="none";return;}
      if(e.key==="Tab"||e.key==="Enter"){
        e.preventDefault();el.value=drop._full;drop.style.display="none";
        el.dispatchEvent(new Event("input",{bubbles:true}));
        if(e.key==="Tab"){
          var all=Array.from(document.querySelectorAll("input:not([disabled]),select:not([disabled]),textarea:not([disabled]),button:not([disabled])"));
          var i=all.indexOf(el);if(i>=0&&all[i+1])all[i+1].focus();
        }
      }
    });
    el.addEventListener("blur",function(){setTimeout(function(){drop.style.display="none";},160);});
    drop.addEventListener("mousedown",function(e){e.preventDefault();el.value=drop._full;drop.style.display="none";el.dispatchEvent(new Event("input",{bubbles:true}));el.focus();});
  });
})();
</script>
</body>
</html>
